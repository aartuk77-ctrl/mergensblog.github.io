<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>İletişim</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f9f9f9;
      color: #333;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2.2em;
      margin: 0;
    }
    section {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      max-width: 700px;
      margin: auto;
    }
    section h2 {
      margin-top: 0;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 10px;
      font-weight: bold;
    }
    input, textarea {
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      background-color: #007acc;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005f99;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.9em;
      color: #666;
    }
  </style>
</head>
<body>
  <header>
    <h1>İletişim</h1>
  </header>

  <section>
    <h2>Bana Ulaşın</h2>
    <p>Herhangi bir sorunuz veya öneriniz varsa aşağıdaki formu doldurabilirsiniz.</p>

    <form>
      <label for="name">Adınız:</label>
      <input type="text" id="name" name="name" placeholder="Adınızı girin">

      <label for="email">E-posta:</label>
      <input type="email" id="email" name="email" placeholder="E-posta adresinizi girin">

      <label for="message">Mesajınız:</label>
      <textarea id="message" name="message" rows="5" placeholder="Mesajınızı yazın"></textarea>

      <button type="submit">Gönder</button>
    </form>
  </section>

  <footer>
    © 2026 Benim Blogum
  </footer>
</body>
</html>
